<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabo Modibbo Official Giveaway</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --dark: #0f172a;
            --gold: #fbbf24;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Floating Coins Background --- */
        .coin {
            position: absolute;
            color: var(--gold);
            font-size: 20px;
            opacity: 0.2;
            z-index: -1;
            animation: float 10s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); }
        }

        .dashboard { width: 100%; max-width: 900px; text-align: center; position: relative; z-index: 10; }

        .profile-container {
            width: 130px; height: 130px; margin: 0 auto 15px;
            border-radius: 50%; border: 4px solid var(--primary);
            overflow: hidden; background: #1e293b;
            box-shadow: 0 0 30px rgba(37, 99, 235, 0.4);
        }
        .profile-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .host-name { font-weight: 700; font-size: 1.6rem; color: var(--primary); margin-bottom: 10px; }
        
        .amount-badge {
            background: rgba(251, 191, 36, 0.15); color: var(--gold);
            padding: 10px 25px; border-radius: 50px; border: 1px solid var(--gold);
            font-weight: 800; display: inline-block; margin-bottom: 25px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        #timer { font-size: 5rem; font-weight: 900; color: var(--gold); margin: 30px 0; display: none; }

        .btn-draw {
            background: linear-gradient(135deg, var(--primary), #1d4ed8);
            color: white; border: none; padding: 20px 60px;
            font-size: 1.4rem; font-weight: 800; border-radius: 15px;
            cursor: pointer; box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            transition: 0.3s;
        }
        .btn-draw:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(37, 99, 235, 0.3); }

        .congrats-msg {
            font-size: 2rem; font-weight: 900; color: var(--success);
            margin: 40px 0 20px; display: none;
            text-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        .winners-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px; margin-top: 20px;
        }

        .winner-card {
            background: rgba(30, 41, 59, 0.8); padding: 20px;
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; gap: 15px;
            backdrop-filter: blur(10px);
            animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .serial-no {
            background: var(--primary); color: white;
            width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; flex-shrink: 0;
        }

        .w-name { font-weight: 800; font-size: 1.2rem; color: var(--gold); text-align: left; }
        .w-detail { font-size: 0.85rem; color: #94a3b8; text-align: left; }

        #downloadBtn {
            margin-top: 40px; background: #334155; color: #cbd5e1;
            border: none; padding: 12px 25px; cursor: pointer;
            border-radius: 10px; display: none; font-weight: 600;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="bg-animation"></div>

<div class="dashboard">
    <div class="host-section">
        <div class="profile-container">
            <img src="images/me.jpg" onerror="this.src='https://via.placeholder.com/150'" alt="Host">
        </div>
        <div class="host-name">Arabo Modibbo Giveaway</div>
        <div class="amount-badge" id="amtDisplay">WIN ₦5,000 EACH</div>
    </div>

    <div id="timer">3</div>
    <button class="btn-draw" id="drawBtn">Start Lucky Draw</button>

    <div class="congrats-msg" id="congratsMsg">🏆 CONGRATULATIONS TO THE WINNERS! 🏆</div>
    <div class="winners-grid" id="winnersContainer"></div>
    
    <button id="downloadBtn">📥 Admin: Download Winners List</button>
</div>

<script>
    // --- SETUP COIN BACKGROUND ---
    const bg = document.getElementById('bg-animation');
    const coinIcons = ['₦', '💰', '✨', '⭐'];
    for(let i=0; i<15; i++) {
        const coin = document.createElement('div');
        coin.className = 'coin';
        coin.innerText = coinIcons[Math.floor(Math.random() * coinIcons.length)];
        coin.style.left = Math.random() * 100 + 'vw';
        coin.style.animationDelay = Math.random() * 5 + 's';
        coin.style.fontSize = (Math.random() * 20 + 20) + 'px';
        bg.appendChild(coin);
    }

    // --- CONFIGURATION ---
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ1s0oJaHwnki5-aoSwFhDJgebj1l4HQqDzS572EksTg9SgpGxOmkFeCayMy9cQm8UMz1I4vB5rsT74/pub?gid=852868014&single=true&output=csv';
    const WINNER_COUNT = 10;           
    const GIVEAWAY_AMOUNT = "₦5,000"; 
    const SELECTION_MODE = 'RANDOM'; 
    const ADMIN_PASSWORD = "123"; 

    const urlParams = new URLSearchParams(window.location.search);
    const isAdmin = urlParams.get('admin') === ADMIN_PASSWORD;

    async function fetchEntries() {
        try {
            const response = await fetch(SHEET_URL);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            return rows.filter(row => row.trim() !== "").map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return {
                    name: (cols[1] || "User").replace(/"/g, ''),
                    phone: (cols[4] || "000").replace(/"/g, ''),
                    lga: (cols[6] || "N/A").replace(/"/g, '')
                };
            });
        } catch (e) { return []; }
    }

    document.getElementById('drawBtn').addEventListener('click', async function() {
        this.style.display = 'none';
        const entries = await fetchEntries();
        if (entries.length === 0) { alert("Sheet is empty!"); this.style.display = 'block'; return; }

        const timer = document.getElementById('timer');
        timer.style.display = 'block';
        let count = 3;
        const countdown = setInterval(() => {
            count--;
            if (count > 0) timer.innerText = count;
            else {
                clearInterval(countdown);
                timer.style.display = 'none';
                revealWinners(entries);
            }
        }, 1000);
    });

    function revealWinners(data) {
        let winners = SELECTION_MODE === 'RANDOM' ? 
            data.sort(() => 0.5 - Math.random()).slice(0, WINNER_COUNT) : 
            data.slice(0, WINNER_COUNT);

        document.getElementById('congratsMsg').style.display = 'block';
        if (isAdmin) document.getElementById('downloadBtn').style.display = 'inline-block';

        winners.forEach((w, i) => {
            setTimeout(() => {
                const card = document.createElement('div');
                card.className = 'winner-card';
                card.innerHTML = `
                    <div class="serial-no">#${i + 1}</div>
                    <div style="flex-grow:1">
                        <div class="w-name">${w.name.split(' ')[0]}</div>
                        <div class="w-detail">${w.lga} • ID: ***${w.phone.slice(-3)}</div>
                    </div>
                    <div style="color:var(--success); font-weight:900">${GIVEAWAY_AMOUNT}</div>
                `;
                document.getElementById('winnersContainer').appendChild(card);
                
                // Confetti blast on last winner
                if (i === winners.length - 1) {
                    confetti({
                        particleCount: 150,
                        spread: 70,
                        origin: { y: 0.6 },
                        colors: ['#2563eb', '#fbbf24', '#10b981']
                    });
                }
            }, i * 600);
        });

        // Store for download
        window.luckyWinners = winners;
    }

    document.getElementById('downloadBtn').addEventListener('click', () => {
        let txt = `ARABO MODIBBO WINNERS\nAmount: ${GIVEAWAY_AMOUNT}\n\n`;
        window.luckyWinners.forEach((w, i) => {
            txt += `${i+1}. ${w.name} | ${w.phone} | ${w.lga}\n`;
        });
        const blob = new Blob([txt], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'winners.txt';
        a.click();
    });
</script>

</body>
</html>
