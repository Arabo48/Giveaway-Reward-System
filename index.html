<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabo Modibbo Official Giveaway</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.9);
            --gold: #fbbf24;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            color: #f8fafc;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .dashboard { width: 100%; max-width: 900px; text-align: center; }

        /* Host Profile */
        .profile-container {
            width: 130px; height: 130px; margin: 0 auto 15px;
            border-radius: 50%; border: 4px solid var(--primary);
            overflow: hidden; background: #1e293b;
            box-shadow: 0 0 25px rgba(37, 99, 235, 0.5);
        }
        .profile-container img { width: 100%; height: 100%; object-fit: cover; }
        .host-name { font-weight: 700; font-size: 1.5rem; color: var(--primary); margin-bottom: 20px; }

        /* Giveaway Details */
        .amount-badge {
            background: rgba(251, 191, 36, 0.1);
            color: var(--gold);
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid var(--gold);
            font-weight: 700;
            display: inline-block;
            margin-bottom: 20px;
        }

        #timer { font-size: 4rem; font-weight: 900; color: var(--gold); margin: 20px 0; display: none; }

        .btn-draw {
            background: linear-gradient(135deg, var(--primary), #1d4ed8);
            color: white; border: none; padding: 18px 45px;
            font-size: 1.2rem; font-weight: 700; border-radius: 12px;
            cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .congrats-msg {
            font-size: 1.8rem; font-weight: 800; color: var(--success);
            margin: 30px 0 10px; display: none;
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* Winners Grid */
        .winners-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px; margin-top: 20px;
        }

        .winner-card {
            background: var(--card-bg); padding: 15px 20px;
            border-radius: 16px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; gap: 15px;
            animation: popIn 0.5s ease forwards;
        }

        .serial-no {
            background: var(--primary); color: white;
            width: 35px; height: 35px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 0.9rem; flex-shrink: 0;
        }

        .winner-info { text-align: left; flex-grow: 1; }
        .w-name { font-weight: 800; font-size: 1.1rem; color: var(--gold); }
        .w-detail { font-size: 0.8rem; color: #94a3b8; }

        .btn-download {
            margin-top: 30px; background: transparent; color: #94a3b8;
            border: 1px solid #475569; padding: 10px 20px; cursor: pointer;
            border-radius: 8px; display: none;
        }

        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="host-section">
        <div class="profile-container">
            <img src="https://graph.facebook.com/4255243461428220/picture?type=large" alt="Arabo Modibbo">
        </div>
        <div class="host-name">Arabo Modibbo Giveaway</div>
        <div class="amount-badge" id="amtDisplay">Loading amount...</div>
    </div>

    <div id="timer">3</div>
    <button class="btn-draw" id="drawBtn">Start Lucky Draw</button>

    <div class="congrats-msg" id="congratsMsg">🎉 Congratulations to the lucky winners! 🎉</div>
    <div class="winners-grid" id="winnersContainer"></div>
    
    <button class="btn-download" id="downloadBtn">📥 Download Winners List (.txt)</button>
</div>

<script>
    // ==========================================
    // CONFIGURATION (CHANGE THESE)
    // ==========================================
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ1s0oJaHwnki5-aoSwFhDJgebj1l4HQqDzS572EksTg9SgpGxOmkFeCayMy9cQm8UMz1I4vB5rsT74/pub?gid=852868014&single=true&output=csv';
    
    const WINNER_COUNT = 10;           // How many people to give?
    const GIVEAWAY_AMOUNT = "₦5,000"; // Amount per person (Put any currency here)
    
    // SELECTION MODE: 
    // Set to 'RANDOM' for luck-based
    // Set to 'TIMESTAMP' for first-come-first-served
    const SELECTION_MODE = 'RANDOM'; 
    // ==========================================

    document.getElementById('amtDisplay').innerText = `Winning Prize: ${GIVEAWAY_AMOUNT} Each`;

    const drawBtn = document.getElementById('drawBtn');
    const container = document.getElementById('winnersContainer');
    const timerDisplay = document.getElementById('timer');
    const congratsMsg = document.getElementById('congratsMsg');
    const downloadBtn = document.getElementById('downloadBtn');

    let luckyWinnersList = [];

    async function fetchEntries() {
        try {
            const response = await fetch(SHEET_URL);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            return rows.filter(row => row.trim() !== "").map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return {
                    name: (cols[1] || "User").replace(/"/g, ''),
                    phone: (cols[4] || "000").replace(/"/g, ''),
                    lga: (cols[6] || "N/A").replace(/"/g, '')
                };
            });
        } catch (e) { return []; }
    }

    drawBtn.addEventListener('click', async () => {
        drawBtn.style.display = 'none';
        const entries = await fetchEntries();
        if (entries.length === 0) { alert("Sheet is empty!"); drawBtn.style.display = 'block'; return; }

        timerDisplay.style.display = 'block';
        let count = 3;
        const timerInt = setInterval(() => {
            count--;
            if (count > 0) timerDisplay.innerText = count;
            else {
                clearInterval(timerInt);
                timerDisplay.style.display = 'none';
                processWinners(entries);
            }
        }, 1000);
    });

    function processWinners(data) {
        // CHOOSE SELECTION LOGIC
        if (SELECTION_MODE === 'RANDOM') {
            luckyWinnersList = data.sort(() => 0.5 - Math.random()).slice(0, WINNER_COUNT);
        } else {
            // Keep original order (First person to fill the form is first)
            luckyWinnersList = data.slice(0, WINNER_COUNT);
        }

        congratsMsg.style.display = 'block';
        downloadBtn.style.display = 'inline-block';

        luckyWinnersList.forEach((winner, index) => {
            setTimeout(() => {
                const firstName = winner.name.split(' ')[0];
                const last3 = winner.phone.slice(-3);
                
                const card = document.createElement('div');
                card.className = 'winner-card';
                card.innerHTML = `
                    <div class="serial-no">#${index + 1}</div>
                    <div class="winner-info">
                        <div class="w-name">${firstName}</div>
                        <div class="w-detail">${winner.lga} • ID: ***${last3}</div>
                    </div>
                    <div style="color:var(--success); font-weight:bold">${GIVEAWAY_AMOUNT}</div>
                `;
                container.appendChild(card);
            }, index * 600);
        });
    }

    // Download Functionality
    downloadBtn.addEventListener('click', () => {
        let content = `GIVEAWAY WINNERS LIST\nAmount: ${GIVEAWAY_AMOUNT} each\n\n`;
        luckyWinnersList.forEach((w, i) => {
            content += `${i+1}. Name: ${w.name} | Phone: ${w.phone} | LGA: ${w.lga}\n`;
        });
        const blob = new Blob([content], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'winners-list.txt';
        a.click();
    });
</script>

</body>
</html>
